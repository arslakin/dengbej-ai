<!DOCTYPE html>
<html>

<head>
  <title>Dengbej AI</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f4f4f4;
    }

    h1 {
      color: #333;
    }

    textarea {
      width: 100%;
      max-width: 700px;
      font-size: 16px;
      padding: 10px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #2a7ae2;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background-color: #1d5fbf;
    }

    #summary {
      margin-top: 20px;
      font-size: 18px;
      max-width: 700px;
    }

    audio {
      margin-top: 20px;
      display: block;
      width: 400px;
    }
  </style>
</head>

<body>

<h1>Dengbej AI Story Generator</h1>

<p>Paste text and generate an AI storytelling summary.</p>

<textarea id="textInput" rows="10" placeholder="Paste text here..."></textarea>

<br>

<button onclick="generateStory()">Generate Dengbej Story</button>

<p id="summary"></p>

<audio id="audioPlayer" controls></audio>

<script>

const lambdaURL = "https://cjopy77iu4rrnlyzzgbk6uldd40hgqdf.lambda-url.us-east-1.on.aws/";

async function generateStory() {

    const text = document.getElementById("textInput").value;
    const summaryElement = document.getElementById("summary");
    const player = document.getElementById("audioPlayer");

    if (!text) {
        alert("Please paste some text first.");
        return;
    }

    summaryElement.innerText = "Generating story...";
    player.pause();
    player.src = "";

    try {

        const response = await fetch(lambdaURL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ text: text })
        });

        const data = await response.json();

        console.log("Lambda response:", data);

        let result;

        if (data.body) {
            result = JSON.parse(data.body);
        } else {
            result = data;
        }

        summaryElement.innerText = result.summary;

        player.src = result.audio_url;
        player.load();

        try {
            await player.play();
        } catch (e) {
            console.log("Autoplay blocked. User can press play.");
        }

    } catch (error) {

        console.error(error);
        summaryElement.innerText = "Error generating story. Check console.";

    }
}

</script>

</body>

</html>
